baseURL: ""
languageCode: en-us
title: Light, Raking
theme: PaperMod

enableInlineShortcodes: true
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
enableEmoji: true
# pygmentsUseClasses: true
# define which sections to include on the homepage
# https://github.com/adityatelange/hugo-PaperMod/wiki/FAQs#posts-from-only-one-foldersection-visible-on-home-page
mainsections: ["blog"]

# https://gohugo.io/configuration/minify/
minify:
  disableXML: true
  minifyOutput: true

# https://gohugo.io/templates/pagination/#pagination-configuration
# pagination:
#   disableAliases: false
#   pagerSize: 5

# outputFormats:
#   llms:
#     mediaType: "text/plain"
#     baseName: "llms"
#     isPlainText: true
#     notAlternative: true

outputs:
  home:
    - HTML
    - RSS
    - JSON
    # - llms

params:
  env: production # to enable google analytics, opengraph, twitter-cards and schema.
  description: "Light, Raking or whatever you call it"
  author: Andrew Raub
  # author: ["Me", "You"] # multiple authors

  # allows /year/date/my-post/ file structure
  # optionally can use 
  # /year/date/{year}-{month}-{day}-my-post/ 
  # or 
  # {year}-{month}-{day}-my-post/ 
  # structure by setting :slug my-post in front matter
  permalinks:
    photos: /:year/:month/:slug/
    blog: /:year/:month/:slug/

  defaultTheme: auto
  # disableThemeToggle: true
  ShowShareButtons: false
  ShowReadingTime: true
  # disableSpecial1stPost: true
  displayFullLangName: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowRssButtonInSectionTermList: true
  ShowAllPagesInArchive: true
  ShowPageNums: true
  ShowToc: false
  # comments: false
  # images: ["images/papermod-cover.png"]

  # profileMode:
  #   enabled: false
  #   title: PaperMod
  #   imageUrl: "#"
  #   imageTitle: my image
  #   # imageWidth: 120
  #   # imageHeight: 120
  #   buttons:
  #     - name: Archives
  #       url: archives
  #     - name: Tags
  #       url: tags

  homeInfoParams:
    Title: "Light, raking or whatever you call it"
    Content: >
      👋 Welcome to my personal blog, portfolio, or whatever I feel like.

  socialIcons:
    - name: github
      title: View Source on Github
      url: "https://github.com/raublekick"
    - name: instagram
      title: Follow me on Instagram
      url: "https://www.instagram.com/raublekick/"

  # editPost:
  #   URL: "https://github.com/adityatelange/hugo-PaperMod/tree/exampleSite/content"
  #   Text: "Suggest Changes" # edit text
  #   appendFilePath: true # to append file path to Edit link

  # label:
  # iconSVG: '<svg xmlns="http://www.w3.org/2000/svg" height="25" viewBox="0 -960 960 960" fill="currentColor"><path d="M320-240h320v-80H320v80Zm0-160h320v-80H320v80ZM240-80q-33 0-56.5-23.5T160-160v-640q0-33 23.5-56.5T240-880h320l240 240v480q0 33-23.5 56.5T720-80H240Zm280-520v-200H240v640h480v-440H520ZM240-800v200-200 640-640Z"/></svg>'
  # text: "Home"
  # icon: icon.png
  # iconHeight: 35

  # analytics:
  #     google:
  #         SiteVerificationTag: "XYZabc"

  assets:
    disableHLJS: true
  #     favicon: "<link / abs url>"
  #     favicon16x16: "<link / abs url>"
  #     favicon32x32: "<link / abs url>"
  #     apple_touch_icon: "<link / abs url>"
  #     safari_pinned_tab: "<link / abs url>"

  # cover:
  #     hidden: true # hide everywhere but not in structured data
  #     hiddenInList: true # hide on list pages and home
  #     hiddenInSingle: true # hide on single page

  # for search
  # https://fusejs.io/api/options.html
  fuseOpts:
      isCaseSensitive: false
      shouldSort: true
      location: 0
      distance: 1000
      threshold: 0.4
      minMatchCharLength: 0
      keys: ["title", "permalink", "summary", "content"]

menu:
  main:
    - identifier: photos
      name: photos
      url: /categories/photos/
      weight: 10
    - identifier: blog
      name: blog
      url: /blog/
      weight: 20
    - identifier: categories
      name: categories
      url: /categories/
      weight: 30
    - identifier: tags
      name: tags
      url: /tags/
      weight: 40

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
    # anchorLineNos: true
    # codeFences: true
    # guessSyntax: true
    # lineNos: true
    # style: monokai

