{{ $galleryPath := .Get "path" }}
{{ $images := resources.Match (printf "%s/*.{jpg,jpeg,png,webp}" $galleryPath) }}

<div class="gallery">
  {{ range $images }}
    <div class="gallery-item">
      <img 
        src="{{ .RelPermalink }}" 
        alt="Gallery image"
        loading="lazy"
      />
    </div>
  {{ end }}
</div>

<style>
  .gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 1rem;
    padding: 1rem 0;
  }

  .gallery-item {
    overflow: hidden;
    border-radius: 8px;
    /* aspect-ratio: 1; */
  }

  .gallery-item img {
    /* width: 100%;
    height: 100%; */
    object-fit: cover;
    transition: transform 0.3s ease;
  }

  .gallery-item img:hover {
    transform: scale(1.05);
  }
</style>
